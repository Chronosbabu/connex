<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afrique Demain - Actualités</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; }
        header { background: #007bff; color: white; padding: 1rem; text-align: center; }
        .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
        .news-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
        .news-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; }
        .news-card img { width: 100%; height: 200px; object-fit: cover; }
        .news-card h3 { padding: 1rem 1rem 0; margin: 0; font-size: 1.1rem; }
        .news-card p { padding: 0 1rem 1rem; color: #666; font-size: 0.9rem; }
        @media (max-width: 768px) { .news-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 480px) { .news-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header><h1>Afrique Demain</h1></header>
    <div class="container">
        <h2>Actualités récentes</h2>
        <div id="news-grid" class="news-grid"></div>
    </div>
    <script>
        const apiBase = window.location.origin;
        async function loadNews() {
            const res = await fetch(`${apiBase}/api/news`);
            const news = await res.json();
            const grid = document.getElementById('news-grid');
            grid.innerHTML = '';
            if (news.length === 0) { grid.innerHTML = '<p>Aucune actualité pour le moment.</p>'; return; }
            news.forEach(item => {
                const short = item.description.length > 100 ? item.description.substring(0,100)+'...' : item.description;
                const card = document.createElement('div');
                card.className = 'news-card';
                card.innerHTML = `
                    <img src="${apiBase}/uploads/${item.image_path}" alt="${item.title}">
                    <h3>${item.title}</h3>
                    <p>${short}</p>
                `;
                card.onclick = () => window.location.href = `${apiBase}/lire?id=${item.id}`;
                grid.appendChild(card);
            });
        }
        window.onload = loadNews;
    </script>
</body>
</html>
